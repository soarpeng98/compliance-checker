<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AI内容合规检测 - 在线版</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"PingFang SC","Microsoft YaHei",sans-serif;background:#0a0e1a;color:#e2e8f0;min-height:100vh}
.container{max-width:800px;margin:0 auto;padding:20px}
header{text-align:center;padding:40px 0 30px}
header h1{font-size:28px;background:linear-gradient(135deg,#60a5fa,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px}
header p{color:#64748b;font-size:14px}
.card{background:#111827;border:1px solid #1e293b;border-radius:16px;padding:24px;margin-bottom:16px}
.card h3{font-size:14px;color:#64748b;margin-bottom:12px;font-weight:500}
.tags{display:flex;flex-wrap:wrap;gap:8px}
.tag{padding:8px 16px;border-radius:8px;font-size:13px;cursor:pointer;background:#1e293b;border:1px solid #334155;color:#94a3b8;user-select:none;transition:all .15s}
.tag.on{background:#1e3a5f;border-color:#3b82f6;color:#93c5fd}
textarea{width:100%;height:180px;padding:14px;border-radius:12px;background:#1e293b;border:1px solid #334155;color:#e2e8f0;font-size:14px;font-family:inherit;resize:vertical;line-height:1.8}
textarea:focus{outline:none;border-color:#3b82f6}
textarea::placeholder{color:#475569}
.btn{width:100%;padding:14px;border:none;border-radius:12px;font-size:16px;font-weight:600;cursor:pointer;margin-top:12px;transition:all .2s}
.btn-primary{background:linear-gradient(135deg,#2563eb,#7c3aed);color:#fff}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 4px 20px rgba(99,102,241,.4)}
.status{text-align:center;padding:12px;font-size:13px;color:#64748b}
.result-item{padding:12px 0;border-bottom:1px solid #1e293b;display:flex;flex-wrap:wrap;gap:6px;align-items:center}
.result-item.error{border-left:3px solid #ef4444;padding-left:13px}
.result-item.warning{border-left:3px solid #f59e0b;padding-left:13px}
.result-word{font-weight:700;font-family:monospace;font-size:14px}
.result-desc{width:100%;font-size:12px;color:#94a3b8}
.result-suggest{width:100%;font-size:12px;color:#6ee7b7}
.summary{display:flex;gap:8px;padding:12px 0}
.badge{padding:4px 12px;border-radius:6px;font-size:12px;font-weight:500}
.badge-err{background:#7f1d1d;color:#fca5a5}
.badge-warn{background:#78350f;color:#fde68a}
.empty{text-align:center;padding:40px;color:#475569;font-size:15px}
footer{text-align:center;padding:40px;color:#334155;font-size:12px}
footer a{color:#475569}
</style>
</head>
<body>
<div class="container">
<header><h1>🛡️ AI内容合规检测</h1><p>在线版 · 粘贴文案即检测 · 无需安装</p></header>
<div class="card"><h3>选择检测行业</h3><div class="tags" id="tags"></div></div>
<div class="card"><textarea id="input" placeholder="在此粘贴要检测的文案...&#10;&#10;支持：公众号文章、小红书文案、产品详情页、直播话术、广告语..."></textarea><button class="btn btn-primary" onclick="doScan()">🔍 开始检测</button></div>
<div class="status" id="status"></div>
<div id="results"></div>
</div>
<footer><p>规则持续更新中 · 如有遗漏欢迎反馈</p><p style="margin-top:4px">📱 推荐安装油猴脚本版，网页右键即用 | Edge扩展版</p></footer>
<script src="rules.js"></script>
<script src="app.js"></script>
</body>
</html>
